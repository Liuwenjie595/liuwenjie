<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>长沙思维完课催补率</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #eef3f9;
      color: #172233;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(680px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid #dbe5f0;
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px;
      color: #66768d;
      line-height: 1.6;
    }
    a {
      color: #275df5;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>长沙思维完课催补率</h1>
    <p>正在跳转到最新 HTML 报告。如果没有自动打开，请点击下面的链接。</p>
    <p><a id="latest-link" href="./Output/latest.html">打开最新报告</a></p>
  </div>
  <script>
    (function () {
      var latestUrl = "./Output/latest.html?v=" + Date.now();
      var link = document.getElementById("latest-link");
      if (link) link.href = latestUrl;
      window.location.replace(latestUrl);
    })();
  </script>
</body>
</html>
